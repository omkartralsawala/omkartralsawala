name: generate contribution snake

on:
  schedule:
    # regenerate twice a day so the grid stays fresh
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      # Data OS cyan theme: bright cyan snake over a dark→cyan dot ramp (dark mode),
      # deep-cyan snake over a light→cyan ramp (light mode). color_dots go empty→full.
      - name: Generate snake SVGs
        uses: Platane/snk@v3
        id: snake-gen
        with:
          github_user_name: omkartralsawala
          outputs: |
            dist/snake-dark.svg?color_snake=#00E5FF&color_dots=#0d1b24,#0e3d47,#0a6b7a,#0090a5,#00b3c8
            dist/snake-light.svg?color_snake=#0097a7&color_dots=#e8f7fa,#a9e2ec,#5cc6d6,#1fa2b5,#00788a

      - name: Push SVGs to the output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
